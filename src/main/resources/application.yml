server:
  port: 8081
  tomcat:
    # 最大工作线程数（高并发建议200-400）
    max-threads: 300
    # 最小空闲线程数
    min-spare-threads: 50
    # 最大连接数
    max-connections: 10000
    # 等待队列长度
    accept-count: 500

spring:
  ai:
    dashscope:
      api-key: sk-a2a5661e418d4c42931e3371953f19a4
  main:
    allow-bean-definition-overriding: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  data:
    redis:
      host: 43.139.17.130
      port: 6739
      password: ZEmYsnpwF4HE3fhe
      database: 0
      redisson:
        config: |
          singleServerConfig:
            address: "redis://43.139.17.130:6739"
            password: "ZEmYsnpwF4HE3fhe"
            database: 0
            connectionMinimumIdleSize: 10
            connectionPoolSize: 64
            timeout: 3000
            retryAttempts: 3
            retryInterval: 1500
          # 看门狗续期时间，默认30秒
          lockWatchdogTimeout: 30000
      lettuce:
        pool:
          # 最大连接数（高并发建议 150-200）
          max-active: 200
          # 最大空闲连接（建议 max-active 的一半）
          max-idle: 100
          # 最小空闲连接（保持一定数量避免冷启动）
          min-idle: 30
          # 连接池最大阻塞等待时间（毫秒），负值表示无限制
          max-wait: 2000
        # 关闭超时时间（毫秒）
        shutdown-timeout: 100ms

  application:
    name: sellsystem
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/miaosha?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456 # 请修改为您的数据库密码
    hikari:
      # 连接池名称
      pool-name: MiaoshaHikariPool
      # 最小空闲连接数（建议等于最大连接数，避免频繁创建）
      minimum-idle: 30
      # 最大连接数（高并发场景建议 30-50）
      maximum-pool-size: 50
      # 连接空闲超时时间（毫秒），默认 600000（10分钟）
      idle-timeout: 300000
      # 连接最大生命周期（毫秒），建议小于 MySQL 的 wait_timeout
      max-lifetime: 1200000
      # 连接超时时间（毫秒），减少等待时间
      connection-timeout: 10000
      # 测试连接是否可用的 SQL
      connection-test-query: SELECT 1
      # 自动提交
      auto-commit: true

mybatis-plus:
